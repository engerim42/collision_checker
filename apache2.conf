# ──────────────────────────────────────────────────────────────────────────────
# gTLD Application Risk Checker — Apache2 Virtual Host
# ──────────────────────────────────────────────────────────────────────────────
#
# Prerequisites
# ─────────────
#   a2enmod proxy proxy_http headers rewrite
#   systemctl reload apache2
#
# The FastAPI/uvicorn process must be running on 127.0.0.1:8000.
# Start it with --workers 1 (in-process job store is not shared across workers):
#
#   cd /opt/ngtld_tools/collision_checker
#   uvicorn api:app --host 127.0.0.1 --port 8000 --workers 1
#
# For a persistent service, see the systemd unit example at the bottom.
#
# ──────────────────────────────────────────────────────────────────────────────
# Option A (RECOMMENDED)
# Apache serves the static search page; /api/* is proxied to uvicorn.
# ──────────────────────────────────────────────────────────────────────────────
#
# Deployment:
#   cp -r /opt/ngtld_tools/collision_checker/static \
#          /var/www/gtld-checker/static
#
# Then enable this VHost:
#   cp apache2.conf /etc/apache2/sites-available/gtld-checker.conf
#   a2ensite gtld-checker
#   systemctl reload apache2

<VirtualHost *:80>
    ServerName gtld-checker.example.com
    # ServerAlias www.gtld-checker.example.com

    # ── Static client ──────────────────────────────────────────────────────
    DocumentRoot /var/www/gtld-checker/static

    <Directory /var/www/gtld-checker/static>
        Options -Indexes -FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # ── Proxy /api/* → uvicorn ─────────────────────────────────────────────
    # --workers 1 is required; see note at the top of this file.
    ProxyPreserveHost On

    ProxyPass        /api/        http://127.0.0.1:8000/api/
    ProxyPassReverse /api/        http://127.0.0.1:8000/api/

    # Also proxy the Swagger UI and OpenAPI schema (useful during development)
    ProxyPass        /docs        http://127.0.0.1:8000/docs
    ProxyPassReverse /docs        http://127.0.0.1:8000/docs
    ProxyPass        /redoc       http://127.0.0.1:8000/redoc
    ProxyPassReverse /redoc       http://127.0.0.1:8000/redoc
    ProxyPass        /openapi.json http://127.0.0.1:8000/openapi.json
    ProxyPassReverse /openapi.json http://127.0.0.1:8000/openapi.json

    # ── Security headers ───────────────────────────────────────────────────
    Header always set X-Content-Type-Options  "nosniff"
    Header always set X-Frame-Options         "SAMEORIGIN"
    Header always set Referrer-Policy         "strict-origin-when-cross-origin"

    ErrorLog  ${APACHE_LOG_DIR}/gtld-checker-error.log
    CustomLog ${APACHE_LOG_DIR}/gtld-checker-access.log combined
</VirtualHost>


# ──────────────────────────────────────────────────────────────────────────────
# Option B (pure reverse proxy — all traffic to uvicorn)
# Use when you want uvicorn/FastAPI to serve static files itself.
# Add StaticFiles mount in api.py:
#   from fastapi.staticfiles import StaticFiles
#   app.mount("/", StaticFiles(directory="static", html=True), name="static")
# ──────────────────────────────────────────────────────────────────────────────
#
# <VirtualHost *:80>
#     ServerName gtld-checker.example.com
#
#     ProxyPreserveHost On
#     ProxyPass        / http://127.0.0.1:8000/
#     ProxyPassReverse / http://127.0.0.1:8000/
#
#     Header always set X-Content-Type-Options "nosniff"
#     Header always set X-Frame-Options        "SAMEORIGIN"
#
#     ErrorLog  ${APACHE_LOG_DIR}/gtld-checker-error.log
#     CustomLog ${APACHE_LOG_DIR}/gtld-checker-access.log combined
# </VirtualHost>


# ──────────────────────────────────────────────────────────────────────────────
# TLS / HTTPS
# ──────────────────────────────────────────────────────────────────────────────
# Use certbot to obtain and auto-renew a certificate:
#   certbot --apache -d gtld-checker.example.com
#
# certbot will add a matching <VirtualHost *:443> block automatically and
# redirect HTTP → HTTPS.


# ──────────────────────────────────────────────────────────────────────────────
# systemd service example  (/etc/systemd/system/gtld-checker.service)
# ──────────────────────────────────────────────────────────────────────────────
#
# [Unit]
# Description=gTLD Application Risk Checker API (uvicorn)
# After=network.target
#
# [Service]
# Type=simple
# User=www-data
# WorkingDirectory=/opt/ngtld_tools/collision_checker
# ExecStart=/usr/local/bin/uvicorn api:app \
#               --host 127.0.0.1 \
#               --port 8000 \
#               --workers 1 \
#               --log-level info
# Restart=on-failure
# RestartSec=5
#
# [Install]
# WantedBy=multi-user.target
#
# Enable:
#   systemctl daemon-reload
#   systemctl enable --now gtld-checker
